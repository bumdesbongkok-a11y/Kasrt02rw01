<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kas RT02 RW01</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f5f9;
padding:15px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
margin-bottom:15px;
}

h2{
text-align:center;
margin-bottom:10px;
}

.saldo{
font-size:30px;
font-weight:bold;
color:green;
text-align:center;
margin:10px 0;
}

input,
select,
button{
width:100%;
padding:10px;
margin:5px 0;
border:1px solid #ddd;
border-radius:8px;
}

button{
background:#2196F3;
color:white;
border:none;
cursor:pointer;
}

.btn-wa{
background:#25D366;
}

.btn-edit{
background:#ff9800;
padding:5px;
}

.btn-hapus{
background:#f44336;
padding:5px;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
}

th{
background:#2196F3;
color:white;
padding:8px;
}

td{
border:1px solid #ddd;
padding:6px;
text-align:center;
}

.table-wrap{
overflow-x:auto;
}

</style>
</head>

<body>

<div class="card">

<h2>Kas RT02 RW01</h2>

<div id="saldo" class="saldo">
Rp 0
</div>

<input type="date" id="tanggal">

<input type="text" id="hari" readonly>

<select id="jenis">
<option value="masuk">Pemasukan</option>
<option value="keluar">Pengeluaran</option>
</select>

<input
type="text"
id="keterangan"
placeholder="Keterangan">

<input
type="number"
id="jumlah"
placeholder="Jumlah">

<button onclick="simpanData()">
💾 Simpan Data
</button>

<button
class="btn-wa"
onclick="shareWA()">
📤 Share WhatsApp
</button>

<label>Dari Tanggal</label>
<input
type="date"
id="tglAwal"
onchange="filterTabel()">

<label>Sampai Tanggal</label>
<input
type="date"
id="tglAkhir"
onchange="filterTabel()">

<button onclick="resetFilter()">
🔄 Reset Filter
</button>

<select id="filterJenis" onchange="filterTabel()">
<option value="">Semua Transaksi</option>
<option value="masuk">Pemasukan Saja</option>
<option value="keluar">Pengeluaran Saja</option>
</select>

<input
type="text"
id="cari"
placeholder="Cari data..."
onkeyup="filterTabel()">

<div style="
display:flex;
gap:8px;
margin-top:10px;
">

<div style="
flex:1;
background:#4CAF50;
color:white;
padding:10px;
border-radius:10px;
text-align:center;
">
<div>➕ Masuk</div>
<div id="totalMasukCari">Rp 0</div>
</div>

<div style="
flex:1;
background:#F44336;
color:white;
padding:10px;
border-radius:10px;
text-align:center;
">
<div>➖ Keluar</div>
<div id="totalKeluarCari">Rp 0</div>
</div>

<div style="
flex:1;
background:#2196F3;
color:white;
padding:10px;
border-radius:10px;
text-align:center;
">
<div>💰 Saldo</div>
<div id="saldoCari">Rp 0</div>
</div>

</div>

</div>

<div class="card table-wrap">

<table>

<thead>
<tr>
<th>Tanggal</th>
<th>Hari</th>
<th>Keterangan</th>
<th>Masuk</th>
<th>Keluar</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="tabelData"></tbody>

</table>

</div>

<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc,
query,
orderBy
}
from
"https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyAXeuLMydRBSi8UplsTTNg4nQpsdFvt27k",
authDomain:"kas-rt-6fe58.firebaseapp.com",
projectId:"kas-rt-6fe58",
storageBucket:"kas-rt-6fe58.firebasestorage.app",
messagingSenderId:"157572581121",
appId:"1:157572581121:web:75cdc549e255ad7d5ffd00"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

let editId = null;

const tanggal =
document.getElementById("tanggal");

const hari =
document.getElementById("hari");

const jenis =
document.getElementById("jenis");

const keterangan =
document.getElementById("keterangan");

const jumlah =
document.getElementById("jumlah");

window.updateHari=function(){

const namaHari=[
"Minggu",
"Senin",
"Selasa",
"Rabu",
"Kamis",
"Jumat",
"Sabtu"
];

hari.value=
namaHari[
new Date(
tanggal.value
).getDay()
];

};

tanggal.addEventListener(
"change",
updateHari
);

const sekarang =
new Date();

tanggal.value =
sekarang
.toISOString()
.split("T")[0];

updateHari();

window.simpanData =
async function(){

const data={
tanggal:tanggal.value,
hari:hari.value,
jenis:jenis.value,
keterangan:keterangan.value,
jumlah:Number(jumlah.value)
};

if(
!data.keterangan ||
!data.jumlah
){
alert("Lengkapi data");
return;
}

if(editId){

await updateDoc(
doc(
db,
"kasrt",
editId
),
data
);

editId=null;

}else{

await addDoc(
collection(
db,
"kasrt"
),
data
);

}

keterangan.value="";
jumlah.value="";

tampilData();

};
window.tampilData =
async function(){

let saldoKas=0;

tabelData.innerHTML="";

const q =
query(
collection(
db,
"kasrt"
),
orderBy(
"tanggal",
"desc"
)
);

const snapshot =
await getDocs(q);

snapshot.forEach(item=>{

const d =
item.data();

saldoKas +=
d.jenis==="masuk"
?
d.jumlah
:
-d.jumlah;

tabelData.innerHTML += `
<tr>

<td>${d.tanggal}</td>

<td>${d.hari}</td>

<td>${d.keterangan}</td>

<td>
${d.jenis==="masuk"
?
"Rp "+
d.jumlah.toLocaleString("id-ID")
:
"-"}
</td>

<td>
${d.jenis==="keluar"
?
"Rp "+
d.jumlah.toLocaleString("id-ID")
:
"-"}
</td>

<td>

<button
class="btn-edit"
onclick="editData(
'${item.id}',
'${d.tanggal}',
'${d.hari}',
'${d.jenis}',
'${d.keterangan}',
${d.jumlah}
)">
Edit
</button>

<button
class="btn-hapus"
onclick="hapusData('${item.id}')">
Hapus
</button>

</td>

</tr>
`;

});

document
.getElementById("saldo")
.innerHTML=
"Rp "+
saldoKas.toLocaleString("id-ID");

filterTabel();

};

window.editData=function(
id,
tgl,
hr,
jns,
ket,
jml
){

editId=id;

tanggal.value=tgl;
hari.value=hr;
jenis.value=jns;
keterangan.value=ket;
jumlah.value=jml;

window.scrollTo({
top:0,
behavior:"smooth"
});

};

window.hapusData=
async function(id){

if(
confirm(
"Hapus data?"
)
){

await deleteDoc(
doc(
db,
"kasrt",
id
)
);

tampilData();

}

};

window.filterTabel =
function(){

let filter =
document.getElementById("cari")
.value
.toLowerCase();

let filterJenis =
document.getElementById("filterJenis")
.value;

let tglAwal =
document.getElementById("tglAwal")
.value;

let tglAkhir =
document.getElementById("tglAkhir")
.value;

let totalMasuk = 0;
let totalKeluar = 0;

document
.querySelectorAll("#tabelData tr")
.forEach(row=>{

let td =
row.querySelectorAll("td");

let jenisData =
td[3].innerText !== "-"
?
"masuk"
:
"keluar";

let tanggal =
td[0].innerText;

let cocokText =
row.innerText
.toLowerCase()
.includes(filter);

let cocokTanggal = true;

if(tglAwal){
cocokTanggal =
tanggal >= tglAwal;
}

if(tglAkhir){
cocokTanggal =
cocokTanggal &&
tanggal <= tglAkhir;
}

let cocokJenis =
!filterJenis ||
jenisData === filterJenis;

let cocok =
cocokText &&
cocokTanggal &&
cocokJenis;

row.style.display =
cocok ? "" : "none";

if(cocok){

let masukText =
td[3].innerText
.replace("Rp","")
.replace(/\./g,"")
.replace(/,/g,"")
.trim();

let keluarText =
td[4].innerText
.replace("Rp","")
.replace(/\./g,"")
.replace(/,/g,"")
.trim();

let masuk =
(masukText && masukText !== "-")
? Number(masukText)
: 0;

let keluar =
(keluarText && keluarText !== "-")
? Number(keluarText)
: 0;

totalMasuk += masuk;
totalKeluar += keluar;

}

});

let saldo =
totalMasuk -
totalKeluar;

document.getElementById(
"totalMasukCari"
).innerHTML =
"Rp " +
totalMasuk.toLocaleString("id-ID");

document.getElementById(
"totalKeluarCari"
).innerHTML =
"Rp " +
totalKeluar.toLocaleString("id-ID");

document.getElementById(
"saldoCari"
).innerHTML =
"Rp " +
saldo.toLocaleString("id-ID");

};

window.shareWA=
async function(){

let pesan=
"📒 LAPORAN KAS RT02/RW01\n\n";

let saldo=0;

const q=
query(
collection(
db,
"kasrt"
),
orderBy(
"tanggal",
"desc"
)
);

const snapshot=
await getDocs(q);

snapshot.forEach(item=>{

const d=
item.data();

saldo +=
d.jenis==="masuk"
?
d.jumlah
:
-d.jumlah;

pesan +=
`${d.tanggal} (${d.hari})\n`;

pesan +=
`${d.keterangan}\n`;

pesan +=
`${d.jenis==="masuk"
?
"➕ Masuk"
:
"➖ Keluar"
} : Rp ${d.jumlah.toLocaleString("id-ID")}\n\n`;

});

pesan +=
"====================\n";

pesan +=
`💰 SALDO KAS : Rp ${saldo.toLocaleString("id-ID")}`;

window.open(
"https://wa.me/?text="+
encodeURIComponent(pesan),
"_blank"
);

};

tampilData();

</script>

</body>
</html>
