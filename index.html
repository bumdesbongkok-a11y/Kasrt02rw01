<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kas RT02RW01</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f5f9;
padding:15px;
}

.card{
background:#fff;
padding:15px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
margin-bottom:15px;
}

h2{
text-align:center;
margin-bottom:10px;
}

.saldo{
font-size:30px;
font-weight:bold;
text-align:center;
color:green;
margin:10px 0;
}

input,select,button{
width:100%;
padding:10px;
margin:5px 0;
border:1px solid #ddd;
border-radius:8px;
}

button{
background:#2196F3;
color:white;
border:none;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.btn-wa{
background:#25D366;
}

.btn-hapus{
background:#f44336;
padding:6px;
}

.btn-edit{
background:#ff9800;
padding:6px;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
}

th{
background:#2196F3;
color:white;
padding:8px;
}

td{
padding:6px;
border:1px solid #ddd;
text-align:center;
}

.table-wrap{
overflow-x:auto;
}

@media(max-width:600px){
table{
font-size:11px;
}
}
</style>
</head>
<body>

<div class="card">

<h2>Kas RT02 RW01</h2>

<div id="saldo" class="saldo">
Rp 0
</div>

<input type="date" id="tanggal">

<input type="text" id="hari" readonly>

<select id="jenis">
<option value="masuk">Pemasukan</option>
<option value="keluar">Pengeluaran</option>
</select>

<input type="text" id="keterangan" placeholder="Keterangan">

<input type="number" id="jumlah" placeholder="Jumlah">

<button onclick="simpanData()">
💾 Simpan Data
</button>

<button class="btn-wa" onclick="shareWA()">
📤 Share WhatsApp
</button>

<input type="text"
id="cari"
placeholder="Cari data..."
onkeyup="filterTabel()">

</div>

<div class="card table-wrap">

<table>

<thead>
<tr>
<th>Tanggal</th>
<th>Hari</th>
<th>Keterangan</th>
<th>Masuk</th>
<th>Keluar</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="tabelData">
</tbody>

</table>

</div>

<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
updateDoc
}
from
"https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyAXeuLMydRBSi8UplsTTNg4nQpsdFvt27k",

authDomain:"kas-rt-6fe58.firebaseapp.com",

projectId:"kas-rt-6fe58",

storageBucket:"kas-rt-6fe58.firebasestorage.app",

messagingSenderId:"157572581121",

appId:"1:157572581121:web:75cdc549e255ad7d5ffd00"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

let editId = null;const tanggal =
document.getElementById("tanggal");

const hari =
document.getElementById("hari");

const jenis =
document.getElementById("jenis");

const keterangan =
document.getElementById("keterangan");

const jumlah =
document.getElementById("jumlah");

window.updateHari = function(){

const value = tanggal.value;

if(!value) return;

const namaHari = [
"Minggu",
"Senin",
"Selasa",
"Rabu",
"Kamis",
"Jumat",
"Sabtu"
];

hari.value =
namaHari[
new Date(value).getDay()
];

};

tanggal.addEventListener(
"change",
updateHari
);

function setToday(){

const d = new Date();

tanggal.value =
d.toISOString().split("T")[0];

updateHari();

}

setToday();

window.simpanData = async function(){

const data = {

tanggal: tanggal.value,

hari: hari.value,

jenis: jenis.value,

keterangan: keterangan.value,

jumlah: Number(jumlah.value)

};

if(
!data.keterangan ||
!data.jumlah
){
alert("Lengkapi data");
return;
}

if(editId){

await updateDoc(
doc(db,"kasrt",editId),
data
);

editId=null;

alert("Data berhasil diubah");

}else{

await addDoc(
collection(db,"kasrt"),
data
);

alert("Data berhasil disimpan");

}

keterangan.value="";
jumlah.value="";

tampilData();

};

window.tampilData =
async function(){

let saldoKas = 0;

tabelData.innerHTML="";

const snapshot =
await getDocs(
collection(db,"kasrt")
);

snapshot.forEach((item)=>{

const d = item.data();

if(d.jenis==="masuk"){
saldoKas += d.jumlah;
}else{
saldoKas -= d.jumlah;
}

tabelData.innerHTML += `
<tr>

<td>${d.tanggal}</td>

<td>${d.hari}</td>

<td>${d.keterangan}</td>

<td>
${d.jenis==="masuk"
?
"Rp "+d.jumlah.toLocaleString("id-ID")
:
"-"}
</td>

<td>
${d.jenis==="keluar"
?
"Rp "+d.jumlah.toLocaleString("id-ID")
:
"-"}
</td>

<td>

<button
class="btn-edit"
onclick="editData(
'${item.id}',
'${d.tanggal}',
'${d.hari}',
'${d.jenis}',
'${d.keterangan}',
${d.jumlah}
)">
Edit
</button>

<button
class="btn-hapus"
onclick="hapusData('${item.id}')">
Hapus
</button>

</td>

</tr>
`;

});
document.getElementById("saldo")
.innerHTML =
"Rp " +
saldoKas.toLocaleString("id-ID");

};

window.editData =
function(
id,
tgl,
hr,
jns,
ket,
jml
){

editId=id;

tanggal.value=tgl;

hari.value=hr;

jenis.value=jns;

keterangan.value=ket;

jumlah.value=jml;

window.scrollTo({
top:0,
behavior:"smooth"
});

};

window.hapusData =
async function(id){

if(confirm("Hapus data ini?")){

await deleteDoc(
doc(db,"kasrt",id)
);

tampilData();

}

};

window.filterTabel =
function(){

const filter =
document
.getElementById("cari")
.value
.toLowerCase();

const rows =
document.querySelectorAll(
"#tabelData tr"
);

rows.forEach(row=>{

row.style.display =
row.innerText
.toLowerCase()
.includes(filter)
?
""
:
"none";

});

};

window.shareWA =
async function(){

let pesan =
"📒 LAPORAN KAS RT02/RW01\n\n";

let saldoTotal = 0;

const snapshot =
await getDocs(
collection(db,"kasrt")
);

snapshot.forEach((item)=>{

const d = item.data();

saldoTotal +=
d.jenis==="masuk"
?
d.jumlah
:
-d.jumlah;

pesan +=
`${d.tanggal} (${d.hari})\n`;

pesan +=
`${d.keterangan}\n`;

pesan +=
`${d.jenis==="masuk"
?
"➕ Masuk"
:
"➖ Keluar"} : Rp ${d.jumlah.toLocaleString("id-ID")}\n\n`;

});

pesan +=
"====================\n";

pesan +=
`💰 SALDO KAS : Rp ${saldoTotal.toLocaleString("id-ID")}`;

window.open(
"https://wa.me/?text=" +
encodeURIComponent(pesan),
"_blank"
);

};

tampilData();

</script>

</body>
</html>
